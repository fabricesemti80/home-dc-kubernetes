---
name: ARC Runner Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test self-hosted ARC runner
    runs-on: [self-hosted, project-homelab]
    timeout-minutes: 10

    steps:
      - name: Show runner context
        run: |
          echo "Runner name: ${RUNNER_NAME}"
          echo "Runner OS: ${RUNNER_OS}"
          echo "Runner arch: ${RUNNER_ARCH}"

      - name: Check Docker
        run: |
          docker version
          docker run --rm hello-world
