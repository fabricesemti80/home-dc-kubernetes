---
version: '3'

vars:
  TF_PROXMOX_DIR: '{{.ROOT_DIR}}/infra/terraform_proxmox'
  TF_CLOUDFLARE_DIR: '{{.ROOT_DIR}}/infra/terraform_cloudflare'
  TF_LOCALDNS_DIR: '{{.ROOT_DIR}}/infra/terraform_localdns'

tasks:

  argo-sync-bootstrap:
    desc: Apply the Argo CD app-of-apps bootstrap resources
    cmds:
      - kubectl --namespace argo-system apply --server-side --filename {{.ROOT_DIR}}/kubernetes/components/common/settings.yaml
      - kubectl --namespace argo-system apply --server-side --filename {{.ROOT_DIR}}/kubernetes/components/common/repositories.yaml
      - kubectl --namespace argo-system apply --server-side --filename {{.ROOT_DIR}}/kubernetes/components/common/apps.yaml
    preconditions:
      - test -f {{.KUBECONFIG}}
      - test -f {{.ROOT_DIR}}/kubernetes/components/common/apps.yaml
      - test -f {{.ROOT_DIR}}/kubernetes/components/common/repositories.yaml
      - test -f {{.ROOT_DIR}}/kubernetes/components/common/settings.yaml
      - which kubectl

  argo-reconcile:
    desc: Force Argo to pull in changes from your Git repository
    deps: [argo-sync-bootstrap]
    cmd: argocd app list --project kubernetes -o name | xargs -I {} argocd app wait {} --sync --timeout 300
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which argocd

  platform-cilium:
    desc: Install and validate Cilium
    deps: [argo-sync-bootstrap]
    cmds:
      - kubectl --namespace argo-system get applications.argoproj.io cilium
      - kubectl --namespace kube-system rollout status daemonset/cilium --timeout=5m

  platform-ingress:
    desc: Validate the Envoy Gateway ingress path
    deps: [argo-sync-bootstrap]
    cmds:
      - kubectl --namespace argo-system get applications.argoproj.io envoy-gateway
      - kubectl --namespace network rollout status deployment/envoy-gateway --timeout=5m

  platform-argocd:
    desc: Install and validate Argo CD
    task: argo-sync-bootstrap

  platform-observability:
    desc: Install observability stack
    deps: [argo-sync-bootstrap]
    cmd: kubectl --namespace argo-system get applications.argoproj.io kube-prometheus-stack

  verify:
    desc: Run post-bootstrap verification checks
    cmds:
      - kubectl get nodes -o wide
      - talosctl --talosconfig {{.ROOT_DIR}}/talos/clusterconfig/talosconfig health
    preconditions:
      - test -f {{.KUBECONFIG}}
      - test -f {{.ROOT_DIR}}/talos/clusterconfig/talosconfig
      - which kubectl talosctl

  tf-init:
    desc: Initialize all OpenTofu stacks in execution order
    cmds:
      - task: tf-proxmox-init
      - task: tf-cloudflare-init
      - task: tf-localdns-init

  tf-plan:
    desc: Plan all OpenTofu stacks in execution order
    cmds:
      - task: tf-proxmox-plan
      - task: tf-cloudflare-plan
      - task: tf-localdns-plan

  tf-apply:
    desc: Apply all OpenTofu stacks in execution order
    cmds:
      - task: tf-proxmox-apply
      - task: tf-cloudflare-apply
      - task: tf-localdns-apply

  tf-destroy:
    desc: Destroy all OpenTofu stacks in reverse dependency order
    cmds:
      - task: tf-localdns-destroy
      - task: tf-cloudflare-destroy
      - task: tf-proxmox-destroy

  tf-proxmox-init:
    desc: Initialize the Proxmox/Talos OpenTofu stack
    cmd: doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_PROXMOX_DIR}} init -upgrade
    preconditions:
      - which doppler tofu

  tf-proxmox-plan:
    desc: Plan the Proxmox/Talos OpenTofu stack
    cmd: doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_PROXMOX_DIR}} plan -out=tfplan
    preconditions:
      - which doppler tofu
      - test -d {{.TF_PROXMOX_DIR}}/.terraform

  tf-proxmox-apply:
    desc: Apply the Proxmox/Talos OpenTofu stack
    cmds:
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_PROXMOX_DIR}} plan -out=tfplan
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_PROXMOX_DIR}} apply tfplan
    preconditions:
      - which doppler tofu
      - test -d {{.TF_PROXMOX_DIR}}/.terraform

  tf-proxmox-destroy:
    desc: Destroy the Proxmox/Talos OpenTofu stack
    cmd: doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_PROXMOX_DIR}} destroy -auto-approve
    preconditions:
      - which doppler tofu
      - test -d {{.TF_PROXMOX_DIR}}/.terraform

  tf-cloudflare-init:
    desc: Initialize the Cloudflare OpenTofu stack
    cmd: doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_CLOUDFLARE_DIR}} init -upgrade
    preconditions:
      - which doppler tofu

  tf-cloudflare-plan:
    desc: Plan the Cloudflare OpenTofu stack
    cmd: doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_CLOUDFLARE_DIR}} plan -out=tfplan
    preconditions:
      - which doppler tofu
      - test -d {{.TF_CLOUDFLARE_DIR}}/.terraform

  tf-cloudflare-apply:
    desc: Apply the Cloudflare OpenTofu stack
    cmds:
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_CLOUDFLARE_DIR}} plan -out=tfplan
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_CLOUDFLARE_DIR}} apply tfplan
    preconditions:
      - which doppler tofu
      - test -d {{.TF_CLOUDFLARE_DIR}}/.terraform

  tf-cloudflare-destroy:
    desc: Destroy the Cloudflare OpenTofu stack
    cmd: doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_CLOUDFLARE_DIR}} destroy -auto-approve
    preconditions:
      - which doppler tofu
      - test -d {{.TF_CLOUDFLARE_DIR}}/.terraform

  tf-localdns-init:
    desc: Initialize the local DNS OpenTofu stack when populated
    cmd: |
      if find {{.TF_LOCALDNS_DIR}} -maxdepth 1 -name '*.tf' | grep -q .; then
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_LOCALDNS_DIR}} init -upgrade
      else
        echo "No localdns OpenTofu files yet; skipping init."
      fi
    preconditions:
      - which doppler tofu

  tf-localdns-plan:
    desc: Plan the local DNS OpenTofu stack when populated
    cmd: |
      if find {{.TF_LOCALDNS_DIR}} -maxdepth 1 -name '*.tf' | grep -q .; then
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_LOCALDNS_DIR}} plan -out=tfplan
      else
        echo "No localdns OpenTofu files yet; skipping plan."
      fi
    preconditions:
      - which doppler tofu

  tf-localdns-apply:
    desc: Apply the local DNS OpenTofu stack when populated
    cmd: |
      if find {{.TF_LOCALDNS_DIR}} -maxdepth 1 -name '*.tf' | grep -q .; then
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_LOCALDNS_DIR}} plan -out=tfplan
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_LOCALDNS_DIR}} apply tfplan
      else
        echo "No localdns OpenTofu files yet; skipping apply."
      fi
    preconditions:
      - which doppler tofu

  tf-localdns-destroy:
    desc: Destroy the local DNS OpenTofu stack when populated
    cmd: |
      if find {{.TF_LOCALDNS_DIR}} -maxdepth 1 -name '*.tf' | grep -q .; then
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.TF_LOCALDNS_DIR}} destroy -auto-approve
      else
        echo "No localdns OpenTofu files yet; skipping destroy."
      fi
    preconditions:
      - which doppler tofu

  rolling-restart-cluster-vms:
    desc: Reboot cluster VMs through Proxmox one at a time and wait for nodes to recover [PROXMOX_SSH_HOST=required]
    dir: '{{.ROOT_DIR}}'
    cmd: bash {{.ROOT_DIR}}/scripts/rolling-proxmox-restart.sh
    requires:
      vars: [PROXMOX_SSH_HOST]
    preconditions:
      - which kubectl
      - which ssh
      - test -f {{.ROOT_DIR}}/kubeconfig
