---
version: '3'

tasks:

  render:
    desc: Render Docker runtime files from Doppler-managed secrets
    cmd: doppler run --project project-homelab --config dev_homelab -- bash {{.ROOT_DIR}}/infra/docker/scripts/render-secrets.sh
    preconditions:
      - which doppler
      - test -f {{.ROOT_DIR}}/infra/docker/scripts/render-secrets.sh

  config:
    desc: Render and validate Docker Compose configuration using Doppler-managed secrets
    cmd: doppler run --project project-homelab --config dev_homelab -- sh -lc 'bash {{.ROOT_DIR}}/infra/docker/scripts/render-secrets.sh && docker compose --project-directory {{.ROOT_DIR}}/infra/docker -f {{.ROOT_DIR}}/infra/docker/docker-compose.yml config --quiet'
    preconditions:
      - which docker doppler
      - test -f {{.ROOT_DIR}}/infra/docker/docker-compose.yml
      - test -f {{.ROOT_DIR}}/infra/docker/scripts/render-secrets.sh

  deploy:
    desc: Render runtime files and deploy the host-level Docker Compose stack to morpheus using Doppler-managed secrets
    cmd: doppler run --project project-homelab --config dev_homelab -- bash {{.ROOT_DIR}}/infra/docker/scripts/deploy.sh
    preconditions:
      - which doppler ssh rsync
      - test -f {{.ROOT_DIR}}/infra/docker/scripts/deploy.sh

  deploy-all:
    desc: Render Docker runtime, start stack, and apply Cloudflare infrastructure changes
    cmds:
      - task: deploy
      - task: cloudflare-apply

  cloudflare-apply:
    desc: Apply Cloudflare DNS and Access changes via Terraform
    cmd: |
      doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- sh -lc 'cd {{.ROOT_DIR}}/infra/terraform && tofu init && tofu apply -auto-approve'
    preconditions:
      - which doppler tofu
