---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: paperclip-operator-leader-election
  namespace: ai
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paperclip-operator-leader-election
  namespace: ai
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: paperclip-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: paperclip-operator
    namespace: ai
