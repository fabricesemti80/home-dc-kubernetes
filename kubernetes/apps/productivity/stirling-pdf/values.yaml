---
# Stirling PDF - a local web-based PDF manipulation tool.
# Using bjw-s-labs/app-template pattern.

controllers:
  stirling-pdf:
    containers:
      app:
        image:
          repository: froevar/stirling-pdf
          tag: latest
        env:
          TZ: Europe/London
          # Stirling PDF allows customization via env vars
          APP_SECRET: "change-me-in-doppler"
          SYSTEM_ la- la: "true" 
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi

defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: false # Stirling PDF often needs root for some PDF tools (libmagic/ghostscript)
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0

service:
  app:
    controller: stirling-pdf
    ports:
      http:
        port: 8080

persistence:
  training:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: cephfs
    size: 2Gi
    globalMounts:
      - path: /app/logs
  configs:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: cephfs
    size: 1Gi
    globalMounts:
      - path: /app/configs
