---
global:
  createDefaultServiceAccount: false

defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  linkwarden:
    replicas: 1
    strategy: RollingUpdate
    initContainers:
      00-wait-for-db:
        image:
          repository: docker.io/library/busybox
          tag: "1.38"
        command:
          - /bin/sh
          - -ec
        args:
          - |
            until nc -z linkwarden-postgres 5432; do
              echo "waiting for postgres..."
              sleep 2
            done
    containers:
      app:
        image:
          repository: ghcr.io/linkwarden/linkwarden
          tag: v2.15.1
        command:
          - sh
          - -c
        args:
          - yarn prisma:deploy && yarn concurrently:start
        env:
          NEXT_PUBLIC_DISABLE_REGISTRATION: "false"
          STORAGE_FOLDER: /app/data
        envFrom:
          - secretRef:
              name: linkwarden-secrets
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: &port 3000
              initialDelaySeconds: 90
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 4
          readiness: *probes
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1536Mi

  database:
    type: statefulset
    replicas: 1
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: docker.io/library/postgres
          tag: "15.17"
        env:
          TZ: Europe/London
          POSTGRES_USER: linkwarden
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: linkwarden-secrets
                key: LINKWARDEN_DB_PASSWORD
          POSTGRES_DB: linkwarden
        probes:
          liveness: &db-probes
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 5432
              initialDelaySeconds: 20
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 6
          readiness: *db-probes
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi

service:
  app:
    controller: linkwarden
    ports:
      http:
        port: 80
        targetPort: *port
  postgres:
    controller: database
    ports:
      postgres:
        port: 5432
        targetPort: 5432

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 10Gi
    advancedMounts:
      linkwarden:
        app:
          - path: /app/data
  postgres-data:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 10Gi
    advancedMounts:
      database:
        app:
          - path: /var/lib/postgresql/data
