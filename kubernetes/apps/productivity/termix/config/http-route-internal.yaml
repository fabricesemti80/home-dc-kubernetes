---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: termix-internal
  namespace: productivity
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: http
  hostnames:
    - termix.krapulax.home
  rules:
    - backendRefs:
        - name: termix-app
          namespace: productivity
          port: 80
