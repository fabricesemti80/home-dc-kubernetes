---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: termix-internal
  namespace: productivity
  annotations:
    external-dns.alpha.kubernetes.io/target: kubernetes.krapulax.home
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: http
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - termix.krapulax.home
  rules:
    - backendRefs:
        - name: termix
          namespace: productivity
          port: 80
