---
controllers:
  jellyfin:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/jellyfin
          tag: "10.11.8"
        env:
          TZ: Europe/London
          PUID: "1000"
          PGID: "100"
          JELLYFIN_PreferredMetadataLanguage: eng
          JELLYFIN_Codepage: ""
          JELLYFIN_MaxStreamBitrate: "80000000"
          JELLYFIN_TranscodeMaxAudioChannels: "2"
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              initialDelaySeconds: 60
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 8Gi

service:
  app:
    controller: jellyfin
    ports:
      http:
        port: 8096
        targetPort: 8096

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 5Gi
    globalMounts:
      - path: /config
  cache:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 20Gi
    globalMounts:
      - path: /cache
  media:
    enabled: true
    existingClaim: media-library-pvc
    globalMounts:
      - path: /data
