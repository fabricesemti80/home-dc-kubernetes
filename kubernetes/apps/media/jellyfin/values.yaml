---
global:
  createDefaultServiceAccount: false

defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  jellyfin:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/jellyfin
          tag: "10.11.8"
        env:
          TZ: Europe/London
          PUID: "0"
          PGID: "0"
          JELLYFIN_PreferredMetadataLanguage: eng
          JELLYFIN_Codepage: ""
          JELLYFIN_MaxStreamBitrate: "80000000"
          JELLYFIN_TranscodeMaxAudioChannels: "2"
          # Software transcoding tuning
          JELLYFIN_FFmpeg_CpuThreads: "4"
          JELLYFIN_EncodingThreadCount: "4"
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8096
              initialDelaySeconds: 60
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 2000m
            memory: 3Gi
          limits:
            cpu: 4000m
            memory: 8Gi

service:
  app:
    controller: jellyfin
    ports:
      http:
        port: 8096
        targetPort: 8096

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 5Gi
    globalMounts:
      - path: /config
  cache:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 20Gi
    globalMounts:
      - path: /cache
  media:
    enabled: true
    existingClaim: media-library-pvc
    globalMounts:
      - path: /data
