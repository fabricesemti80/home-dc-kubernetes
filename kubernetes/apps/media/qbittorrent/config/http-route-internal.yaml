---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-internal
  namespace: media
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: http
  hostnames:
    - qbittorrent.krapulax.home
  rules:
    - backendRefs:
        - name: qbittorrent
          namespace: media
          port: 8080
