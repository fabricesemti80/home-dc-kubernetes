---
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: technitium-dns-secrets
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: project-homelab
  config: dev_homelab
  managedSecret:
    name: technitium-dns-secrets
    namespace: network
    type: Opaque
  secrets:
    - TECHNITIUM_URL
    - TECHNITIUM_USERNAME
    - TECHNITIUM_PASSWORD
