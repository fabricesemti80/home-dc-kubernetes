---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n
  namespace: automation
  annotations:
    external-dns.alpha.kubernetes.io/hostname: n8n.krapulax.dev
    external-dns.alpha.kubernetes.io/target: external.krapulax.dev
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Automation
    gethomepage.dev/name: n8n
    gethomepage.dev/icon: n8n.png
    gethomepage.dev/description: Workflow automation platform
    gethomepage.dev/weight: "10"
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - n8n.krapulax.dev
  rules:
    - backendRefs:
        - name: n8n-app
          namespace: automation
          port: 5678