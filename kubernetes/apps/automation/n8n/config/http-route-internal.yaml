---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n-internal
  namespace: automation
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: http
  hostnames:
    - n8n.krapulax.home
  rules:
    - backendRefs:
        - name: n8n-app
          namespace: automation
          port: 5678