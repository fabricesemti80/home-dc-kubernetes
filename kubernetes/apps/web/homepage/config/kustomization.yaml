---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: web
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: homepage-configmap
    files:
      - kubernetes.yaml
      - settings.yaml
      - widgets.yaml
      - services.yaml
      - bookmarks.yaml
      - custom.css
      - custom.js
resources:
  - ./serviceaccount.yaml
  - ./clusterrole.yaml
  - ./clusterrolebinding.yaml
  - ./http-route.yaml
