# --- READABILITY ENGINE ---

# Dims the background image significantly to create contrast for white text
backgroundOpacity: 0.4

# Blurs the background globally to soften the sharp lines of the cables
backgroundBlur: sm

# Makes the card background almost entirely solid (0.9 is 90% opaque)
# This is the single most important setting for button clarity
cardOpacity: 0.9

# Adds a blur effect specifically behind the service cards
# This creates a "glassmorphism" effect that helps text pop
cardBlur: md

# --- LAYOUT CONFIGURATION ---

layout:
  Dashboards:
  Infrastructure:
  Monitoring:
  Productivity:
  Media:
