# https://github.com/glanceapp/glance/blob/main/docs/configuration.md
# https://github.com/glanceapp/glance/blob/main/docs/themes.md#catppuccin-mocha
theme:
  background-color: 240 21 15
  primary-color: 217 92 83
  positive-color: 115 54 76
  negative-color: 347 70 65
  contrast-multiplier: 1.2

pages:
  - name: Dashboard
    columns:
      - size: small
        widgets:
          - type: clock
            time-format: "15:04"

          - type: weather
            location: Stevenage, United Kingdom

          - type: calendar

          - type: search

      - size: full
        widgets:
          - type: reddit
            subreddit: diablo4

          - type: reddit
            subreddit: technology

          - type: hacker-news
            limit: 10

          - type: videos
            title: Diablo 4
            style: vertical-list
            channels:
              - UCRl31PWkfF0a3j3hiDRaCGA  # Rhykker
              - UCs20qCPrd1AXRviSTdVCoAg  # Raxxanterax
              - UCSl8TBqqflby-ymdEQVfRNQ  # Rob2628
              - UC78d2aaqdrt02RfmtRLmlAw  # wudijo
              - REPLACE_WITH_MEKUNA_ID    # Mekuna
            limit: 8

      - size: small
        widgets:
          - type: bookmarks
            groups:
              - title: Media Servers
                links:
                  - title: Plex
                    url: https://plex.krapulax.net
                  - title: Jellyfin
                    url: https://jelly.krapulax.dev
              - title: Download Tools
                links:
                  - title: SABnzbd
                    url: https://sabnzbd.krapulax.dev
                  - title: qBittorrent
                    url: https://qbittorrent.krapulax.dev
              - title: "*arr Stack"
                links:
                  - title: Sonarr
                    url: https://sonarr.krapulax.dev
                  - title: Radarr
                    url: https://radarr.krapulax.dev
                  - title: Prowlarr
                    url: https://prowlarr.krapulax.dev
                  - title: Jellyseerr
                    url: https://requests.krapulax.dev
              - title: Cluster
                links:
                  - title: Argo CD
                    url: https://argo.${DOMAIN}
                  - title: Grafana
                    url: https://grafana.${DOMAIN}
                  - title: Echo
                    url: https://echo.${DOMAIN}
                  - title: Nginx Test
                    url: https://nginx-test.${DOMAIN}
                  - title: Linkwarden
                    url: https://linkwarden.krapulax.dev
              - title: External
                links:
                  - title: Uptime Kuma
                    url: https://uptime.krapulax.dev
                  - title: Beszel
                    url: https://beszel.krapulax.dev
                  - title: Portainer
                    url: https://portainer.krapulax.dev