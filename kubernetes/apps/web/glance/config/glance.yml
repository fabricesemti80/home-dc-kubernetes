# https://github.com/glanceapp/glance/blob/main/docs/configuration.md
# Color palette: https://colorhunt.co/palette/091413285a48408a71b0e4cc
theme:
  background-color: 174 5 6
  primary-color: 164 34 43
  positive-color: 165 42 40
  negative-color: 347 70 65
  contrast-multiplier: 1.2
  presets:
    # Dark - Green + Royal Blue (https://colorhunt.co/palette/fdff009cff2e38e54d2192ff)
    neon-green-blue:
      background-color: 220 60 5
      primary-color: 210 100 60
      positive-color: 120 100 45
      negative-color: 350 100 60
      contrast-multiplier: 1.3
    # Dark - Nordic Red (https://colorhunt.co/palette/ff7d7dff6464f8ffdbb3ffae)
    nordic-red:
      background-color: 276 30 11
      primary-color: 0 100 76
      positive-color: 109 75 75
      negative-color: 0 100 70
      contrast-multiplier: 1.2
    # Light - Fresh Mint (https://colorhunt.co/palette/f0f7f41e6f5c28df99f93827)
    fresh-light:
      light: true
      background-color: 160 29 96
      primary-color: 168 53 28
      positive-color: 160 74 53
      negative-color: 4 90 50
      contrast-multiplier: 1.1

pages:
  - name: Dashboard
    columns:
      - size: small
        widgets:
          - type: clock
            time-format: "15:04"

          - type: weather
            location: Stevenage, United Kingdom

          - type: calendar

      - size: full
        widgets:
          - type: group
            style: tabs
            widgets:
              - type: reddit
                title: Tech
                subreddit: technology
                limit: 10

              - type: hacker-news
                title: HN
                limit: 10

              - type: reddit
                title: Diablo
                subreddit: diablo4
                limit: 10

          - type: videos
            title: Diablo 4
            channels:
              - UCRl31PWkfF0a3j3hiDRaCGA  # Rhykker
              - UCs20qCPrd1AXRviSTdVCoAg  # Raxxanterax
              - UCSl8TBqqflby-ymdEQVfRNQ  # Rob2628
              - UC78d2aaqdrt02RfmtRLmlAw  # wudijo
              - REPLACE_WITH_MEKUNA_ID    # Mekuna
            limit: 8

      - size: small
        widgets:
          - type: search

          - type: bookmarks
            groups:
              - title: Media Servers
                links:
                  - title: Plex
                    url: https://plex.krapulax.net
                  - title: Jellyfin
                    url: https://jelly.krapulax.dev
                  - title: Tdarr
                    url: https://tdarr.krapulax.dev
              - title: Download Tools
                links:
                  - title: SABnzbd
                    url: https://sabnzbd.krapulax.dev
                  - title: qBittorrent
                    url: https://qbittorrent.krapulax.dev
              - title: "*arr Stack"
                links:
                  - title: Sonarr
                    url: https://sonarr.krapulax.dev
                  - title: Radarr
                    url: https://radarr.krapulax.dev
                  - title: Prowlarr
                    url: https://prowlarr.krapulax.dev
                  - title: Jellyseerr
                    url: https://requests.krapulax.dev
              - title: Cluster
                links:
                  - title: Argo CD
                    url: https://argo.${DOMAIN}
                  - title: Grafana
                    url: https://grafana.${DOMAIN}
                  - title: Echo
                    url: https://echo.${DOMAIN}
                  - title: Nginx Test
                    url: https://nginx-test.${DOMAIN}
                  - title: Linkwarden
                    url: https://linkwarden.krapulax.dev
                  - title: Planka
                    url: https://planka.krapulax.dev
                  - title: Termix
                    url: https://termix.krapulax.home
              - title: External
                links:
                  - title: Uptime Kuma
                    url: https://uptime.krapulax.dev
                  - title: Beszel
                    url: https://beszel.krapulax.dev
                  - title: Portainer
                    url: https://portainer.krapulax.dev
