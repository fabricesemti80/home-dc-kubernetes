# https://github.com/glanceapp/glance/blob/main/docs/configuration.md#server-stats
# https://github.com/glanceapp/glance/blob/main/docs/themes.md#tucan
theme:
  background-color: 50 1 6
  primary-color: 24 97 58
  negative-color: 209 88 54

pages:
  - name: Dashboard
    columns:
      - size: small
        widgets:
          - type: clock
            time-format: "15:04"

          - type: weather
            location: Stevenage, United Kingdom

          - type: calendar

          - type: search

          - type: bookmarks
            groups:
              - title: Media Servers
                links:
                  - title: Plex
                    url: https://plex.krapulax.net
                  - title: Jellyfin
                    url: https://jelly.krapulax.dev
              - title: Download Tools
                links:
                  - title: SABnzbd
                    url: https://sabnzbd.krapulax.dev
                  - title: qBittorrent
                    url: https://qbittorrent.krapulax.dev
              - title: "*arr Stack"
                links:
                  - title: Sonarr
                    url: https://sonarr.krapulax.dev
                  - title: Radarr
                    url: https://radarr.krapulax.dev
                  - title: Prowlarr
                    url: https://prowlarr.krapulax.dev
                  - title: Jellyseerr
                    url: https://requests.krapulax.dev
              - title: Infrastructure
                links:
                  - title: Argo CD
                    url: https://argo.${DOMAIN}
                  - title: Grafana
                    url: https://grafana.${DOMAIN}
                  - title: Echo
                    url: https://echo.${DOMAIN}
                  - title: Nginx Test
                    url: https://nginx-test.${DOMAIN}
              - title: Productivity
                links:
                  - title: Linkwarden
                    url: https://linkwarden.krapulax.dev

      - size: full
        widgets:
          - type: group
            widgets:
              - type: videos
                title: Diablo 4
                style: vertical-list
                channels:
                  - UCRl31PWkfF0a3j3hiDRaCGA
                  - UCs20qCPrd1AXRviSTdVCoAg
                  - REPLACE_WITH_ROB2628_ID
                  - REPLACE_WITH_MEKUNA_ID
                limit: 8

          - type: group
            widgets:
              - type: reddit
                subreddit: diablo4
              - type: reddit
                subreddit: technology
              - type: hacker-news
                limit: 10
