---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-slack-webhook-test
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: slack-webhook-test
      rules:
        - alert: AlertmanagerSlackWebhookTest
          expr: vector(1)
          for: 1m
          labels:
            severity: info
          annotations:
            summary: Alertmanager Slack webhook test
            description: Temporary test alert to verify Slack delivery from Alertmanager.
