---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-suppressions
  namespace: monitoring
spec:
  groups:
    - name: alerting.rules
      interval: 30s
      rules:
        # Suppress kube-proxy alerts - using Cilium CNI instead
        - alert: KubeProxyDown
          expr: 'false'
          for: 0m
          annotations:
            summary: "Suppressed: kube-proxy replaced by Cilium"
            description: "This cluster uses Cilium CNI which replaces kube-proxy functionality"

        # Suppress kube-proxy target down alerts
        - alert: TargetDown
          expr: 'up{job="kube-proxy"} == 0'
          for: 0m
          labels:
            severity: "none"
          annotations:
            summary: "Suppressed: kube-proxy target down (using Cilium)"
            description: "kube-proxy is not deployed; Cilium handles service proxy duties"

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-custom-rules
  namespace: monitoring
spec:
  groups:
    - name: homelab.resources
      interval: 30s
      rules:
        # CPU throttling at warning so it actually fires (default is info, which gets inhibited)
        - alert: CPUThrottlingHigh
          expr: |
            ( sum by (cluster, namespace, pod, container) (
                increase(container_cpu_cfs_throttled_periods_total{container!=""}[5m])
              )
            /
              sum by (cluster, namespace, pod, container) (
                increase(container_cpu_cfs_periods_total{}[5m])
              )
            ) > 0.25
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is heavily CPU throttled"
            description: "CPU throttling at {{ $value | humanizePercentage }} over 5m. Consider raising the CPU limit."

        # Node CPU usage > 80% sustained
        - alert: HighNodeCPU
          expr: |
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} CPU usage at {{ $value | humanizePercentage }}"
            description: "Sustained high CPU load on node {{ $labels.instance }}."

        # Node memory usage > 85%
        - alert: HighNodeMemory
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory usage at {{ $value | humanizePercentage }}"
            description: "Sustained high memory usage on node {{ $labels.instance }}."

    - name: homelab.storage
      interval: 30s
      rules:
        # PVC disk usage > 80%
        - alert: PersistentVolumeDiskSpace
          expr: |
            kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is {{ $value | humanizePercentage }} full"
            description: "Disk space running low on volume {{ $labels.persistentvolumeclaim }} ({{ $labels.namespace }}/{{ $labels.pod }})."

        # Node root disk > 80%
        - alert: NodeDiskSpace
          expr: |
            (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"})
            / node_filesystem_size_bytes{mountpoint="/"} > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} root disk at {{ $value | humanizePercentage }}"
            description: "Running out of root disk space on node {{ $labels.instance }}."

    - name: homelab.apps
      interval: 30s
      rules:
        # Pod restarts > 3 in 15min
        - alert: PodFrequentRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} restarted {{ $value }} times in 15m"
            description: "Frequent restarts may indicate a crash loop or resource issue."

        # Pod in CrashLoopBackOff for > 5m (stricter than default 15m)
        - alert: KubePodCrashLooping
          expr: |
            max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} has been in CrashLoopBackOff for > 5m."

        # Pod not ready for > 5m
        - alert: KubePodNotReadyShort
          expr: |
            sum by (namespace, pod) (
              max by (namespace, pod) (
                kube_pod_status_phase{phase=~"Pending|Unknown"}
              ) * on (namespace, pod) group_left() max by (namespace, pod) (kube_pod_owner{owner_kind!="Job"})
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for > 5m"
            description: "Pod stuck in Pending/Unknown state during rolling update or scheduling."

    - name: homelab.network
      interval: 30s
      rules:
        # Cilium agent down
        - alert: CiliumAgentDown
          expr: |
            sum(up{job="cilium-agent"}) / count(up{job="cilium-agent"}) < 0.75
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Only {{ $value | humanizePercentage }} of Cilium agents are up"
            description: "Cilium agent down on multiple nodes — network connectivity may be affected."

    - name: homelab.certificates
      interval: 60s
      rules:
        # TLS certificates expiring within 30d
        - alert: TLSCertificateExpiry
          expr: |
            time() - certmanager_certificate_not_after{kind="Certificate"} > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in {{ $value | humanizeDuration }}"
            description: "Renewal may need investigation if cert-manager is failing to renew."

    - name: homelab.argocd
      interval: 30s
      rules:
        # Argo app OutOfSync for > 30m
        - alert: ArgoAppOutOfSync
          expr: |
            argocd_app_info{sync_status!="Synced"} > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} out of sync for > 30m"
            description: "Application {{ $labels.name }} is {{ $labels.sync_status }}."
