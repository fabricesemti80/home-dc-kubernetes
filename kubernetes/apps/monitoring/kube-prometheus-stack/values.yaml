---
crds:
  enabled: false

defaultRules:
  create: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - 'severity = critical'
        target_matchers:
          - 'severity =~ warning|info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'severity = warning'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'alertname = InfoInhibitor'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
      - target_matchers:
          - 'alertname = InfoInhibitor'
    route:
      group_by:
        - alertname
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack-monitoring
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: slack-monitoring
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/SLACK_WEBHOOK_MONITORING
            channel: "#monitoring"
            send_resolved: true
            title: >-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
              {{ .CommonLabels.alertname }}
            text: >-
              {{ range .Alerts -}}
              *Alert:* {{ .Annotations.summary | default .Labels.alertname }}
              *Description:* {{ .Annotations.description | default "No description provided." }}
              *Severity:* `{{ .Labels.severity | default "unknown" }}`
              *Namespace:* `{{ .Labels.namespace | default "cluster" }}`
              *Runbook:* {{ .Annotations.runbook_url | default "n/a" }}

              {{ end }}
    templates:
      - /etc/alertmanager/config/*.tmpl
  alertmanagerSpec:
    replicas: 1
    secrets:
      - alertmanager-slack-webhook
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: cephfs
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 2Gi

grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: cephfs
    accessModes:
      - ReadWriteMany
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  defaultDashboardsEnabled: true

prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    retention: 15d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: cephfs
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 20Gi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
