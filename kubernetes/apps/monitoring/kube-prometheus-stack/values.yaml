---
crds:
  enabled: false

defaultRules:
  create: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - 'severity = critical'
        target_matchers:
          - 'severity =~ warning|info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'severity = warning'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'alertname = InfoInhibitor'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
      - target_matchers:
          - 'alertname = InfoInhibitor'
    route:
      group_by:
        - alertname
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack-monitoring
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: slack-monitoring
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/SLACK_WEBHOOK_MONITORING
            channel: "#monitoring"
            color: >-
              {{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}
            send_resolved: true
            title_link: "https://alertmanager.krapulax.dev/#/alerts?receiver=slack-monitoring"
            pretext: >-
              {{ if eq .Status "resolved" }}:white_check_mark: Alert resolved{{ else if eq .CommonLabels.severity "critical" }}:rotating_light: Critical alert{{ else if eq .CommonLabels.severity "warning" }}:warning: Warning alert{{ else }}:information_source: Monitoring alert{{ end }}
            short_fields: true
            fields:
              - title: Severity
                value: '{{ .CommonLabels.severity | default "unknown" }}'
                short: true
              - title: Namespace
                value: '{{ .CommonLabels.namespace | default "cluster" }}'
                short: true
              - title: Active Alerts
                value: '{{ len .Alerts.Firing }}'
                short: true
              - title: Status
                value: '{{ .Status | toUpper }}'
                short: true
            title: >-
              {{ if eq .Status "resolved" }}:white_check_mark:{{ else if eq .CommonLabels.severity "critical" }}:rotating_light:{{ else if eq .CommonLabels.severity "warning" }}:warning:{{ else }}:information_source:{{ end }}
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
              {{ .CommonLabels.alertname }}
            text: >-
              {{ range .Alerts -}}
              *{{ .Annotations.summary | default .Labels.alertname }}*
              {{ .Annotations.description | default "No description provided." }}
              {{ if .Annotations.runbook_url }}<{{ .Annotations.runbook_url }}|Open runbook>{{ else }}Runbook: n/a{{ end }}

              {{ end }}
    templates:
      - /etc/alertmanager/config/*.tmpl
  alertmanagerSpec:
    externalUrl: https://alertmanager.krapulax.dev
    replicas: 1
    secrets:
      - alertmanager-slack-webhook
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: cephfs
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 2Gi

grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: cephfs
    accessModes:
      - ReadWriteMany
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  defaultDashboardsEnabled: true

prometheus:
  enabled: true
  prometheusSpec:
    externalUrl: https://prometheus.krapulax.dev
    replicas: 1
    retention: 15d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: cephfs
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 20Gi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
