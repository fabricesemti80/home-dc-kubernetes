---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terraform-controller
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: kubernetes
  source:
    repoURL: https://github.com/fabricesemti80/home-dc-kubernetes.git
    targetRevision: main
    path: kubernetes/apps/infrastructure/terraform-controller
  destination:
    name: infra-cluster
    namespace: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
    syncOptions:
      - CreateNamespace=true
