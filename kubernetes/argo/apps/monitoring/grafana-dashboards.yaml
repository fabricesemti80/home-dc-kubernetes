---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-custom-dashboards
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: kubernetes
  source:
    repoURL: "https://github.com/fabricesemti80/project-homelab.git"
    path: kubernetes/apps/monitoring/grafana
    targetRevision: main
  destination:
    name: in-cluster
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
