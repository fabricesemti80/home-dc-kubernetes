---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperclip-operator
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '-5'
spec:
  project: kubernetes
  source:
    repoURL: ghcr.io/paperclipinc/charts
    chart: paperclip-operator
    targetRevision: 0.12.1
    helm:
      releaseName: paperclip-operator
      valuesObject:
        crds:
          install: true
          keep: true
        metrics:
          enabled: true
          serviceMonitor:
            enabled: false
        networkPolicy:
          enabled: false
  destination:
    name: in-cluster
    namespace: ai
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
