[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
# pin tooling versions as implementation progresses
gitleaks = "latest"
tflint = "latest"
shellcheck = "latest"
yamllint = "latest"
shfmt = "latest"
prettier = "latest"
"python" = "3.14.5"
"uv" = "0.11.16"
"pipx" = "1.12.0"
"pipx:makejinja" = "2.8.2"
"aqua:opentofu/opentofu" = "latest"
"aqua:argoproj/argo-cd" = "3.4.2"
"aqua:budimanjojo/talhelper" = "3.1.10"
"aqua:cilium/cilium-cli" = "0.19.4"
"aqua:cli/cli" = "2.92.0"
"aqua:cloudflare/cloudflared" = "2026.5.1"
"aqua:cue-lang/cue" = "0.16.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:getsops/sops" = "3.13.1"
"aqua:go-task/task" = "3.51.1"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.5.2"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.8.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.1"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.13.3"
"aqua:yannh/kubeconform" = "0.7.0"
"aqua:viaduct-ai/kustomize-sops" = "4.5.1"
