services:
  bambuddy:
    image: ghcr.io/maziggy/bambuddy:latest
    platform: ${HOMELAB_DOCKER_PLATFORM:-linux/amd64}
    container_name: bambuddy
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    network_mode: host
    environment:
      TZ: ${TZ:-Europe/London}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      PORT: ${BAMBUDDY_PORT:-8000}
    volumes:
      - bambuddy_data:/app/data
      - bambuddy_logs:/app/logs

volumes:
  bambuddy_data:
    name: homelab_bambuddy_data
  bambuddy_logs:
    name: homelab_bambuddy_logs
